<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI人才评估系统 - 选择测评模式</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh; overflow: hidden;
            background: #0a0e17;
        }
        .split-container {
            display: flex; height: 100vh; width: 100%;
        }
        .panel {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 3rem 2rem; position: relative;
            cursor: pointer; transition: flex 0.6s cubic-bezier(.4,0,.2,1);
            overflow: hidden;
        }
        .panel::before {
            content: ''; position: absolute; inset: 0;
            transition: opacity 0.6s ease; z-index: 0;
        }
        .panel-classic::before {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .panel-starcore::before {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 40%, #1e293b 100%);
        }
        .panel:hover { flex: 1.4; }
        .panel:not(:hover) { flex: 0.8; }
        .split-container:not(:hover) .panel { flex: 1; }

        .divider {
            width: 1px; background: rgba(255,255,255,0.08);
            position: relative; z-index: 10;
        }
        .divider::after {
            content: 'VS'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: rgba(255,255,255,0.25); font-size: 0.85rem;
            font-weight: 700; letter-spacing: 2px;
            background: #0a0e17; padding: 1rem 0.5rem;
        }

        .panel-content {
            position: relative; z-index: 1;
            text-align: center; max-width: 420px;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .panel:hover .panel-content { transform: translateY(-8px); }

        .panel-icon {
            width: 72px; height: 72px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 1.5rem;
            transition: transform 0.4s ease;
        }
        .panel:hover .panel-icon { transform: scale(1.1); }

        .panel-classic .panel-icon {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .panel-starcore .panel-icon {
            background: rgba(72, 149, 239, 0.15);
            color: #4895ef; border: 1px solid rgba(72, 149, 239, 0.3);
        }

        .panel-title {
            font-size: 1.6rem; font-weight: 700;
            margin-bottom: 0.6rem; line-height: 1.3;
        }
        .panel-classic .panel-title { color: #c7d2fe; }
        .panel-starcore .panel-title {
            background: linear-gradient(90deg, #4895ef, #4cc9f0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .panel-subtitle {
            font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.6;
        }
        .panel-classic .panel-subtitle { color: #94a3b8; }
        .panel-starcore .panel-subtitle { color: #94a3b8; }

        .panel-features {
            text-align: left; margin-bottom: 2rem;
        }
        .feature-item {
            display: flex; align-items: flex-start; gap: 0.6rem;
            margin-bottom: 0.7rem; font-size: 0.88rem;
            color: #94a3b8; line-height: 1.4;
        }
        .feature-item i { margin-top: 0.15rem; font-size: 0.75rem; }
        .panel-classic .feature-item i { color: #818cf8; }
        .panel-starcore .feature-item i { color: #4895ef; }

        .enter-btn {
            display: inline-flex; align-items: center; gap: 0.6rem;
            padding: 0.85rem 2rem; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600;
            border: none; cursor: pointer;
            transition: all 0.3s ease; text-decoration: none;
        }
        .panel-classic .enter-btn {
            background: rgba(99, 102, 241, 0.15);
            color: #c7d2fe; border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .panel-classic .enter-btn:hover {
            background: rgba(99, 102, 241, 0.25);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
        }
        .panel-starcore .enter-btn {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: white; border: none;
        }
        .panel-starcore .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(67, 97, 238, 0.4);
        }

        .recommend-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: linear-gradient(90deg, #f72585, #b5179e);
            color: white; padding: 0.25rem 0.8rem;
            border-radius: 20px; font-size: 0.75rem;
            font-weight: 600; margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 8px rgba(247, 37, 133, 0.3); }
            to { box-shadow: 0 0 16px rgba(247, 37, 133, 0.6); }
        }

        .time-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            color: #64748b; font-size: 0.8rem; margin-top: 0.8rem;
        }

        /* Stars background for starcore panel */
        .stars {
            position: absolute; inset: 0; z-index: 0; overflow: hidden;
        }
        .star {
            position: absolute; width: 2px; height: 2px;
            background: white; border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .panel { padding: 2rem 1.5rem; }
            .panel:hover { flex: 1.3; }
            .panel:not(:hover) { flex: 0.85; }
            .divider { width: 100%; height: 1px; }
            .divider::after { padding: 0.5rem 1rem; }
            .panel-title { font-size: 1.3rem; }
        }
        @media (max-width: 480px) {
            .panel-features { display: none; }
            .panel-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- Left: Classic Assessment -->
        <div class="panel panel-classic" onclick="window.location.href='./classic/'">
            <div class="panel-content">
                <div class="panel-icon">
                    <i class="fas fa-pen-fancy"></i>
                </div>
                <div class="panel-title">AI业务天赋速测</div>
                <div class="panel-subtitle">6题精准评估，AI逐题判定<br>快速识别你的业务思维特质</div>
                <div class="panel-features">
                    <div class="feature-item"><i class="fas fa-check"></i>6道结构化情景题</div>
                    <div class="feature-item"><i class="fas fa-check"></i>AI双重判定 + 五维评分</div>
                    <div class="feature-item"><i class="fas fa-check"></i>即时出结果，适合快速筛选</div>
                </div>
                <a class="enter-btn" href="./classic/">
                    <i class="fas fa-arrow-right"></i> 进入传统测评
                </a>
                <div class="time-badge"><i class="fas fa-clock"></i> 约5-10分钟</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Right: Starcore Assessment -->
        <div class="panel panel-starcore" onclick="window.location.href='starcore/index.html'">
            <div class="stars" id="starsContainer"></div>
            <div class="panel-content">
                <div class="recommend-badge">
                    <i class="fas fa-star"></i> 推荐体验
                </div>
                <div class="panel-icon">
                    <i class="fas fa-rocket"></i>
                </div>
                <div class="panel-title">星核纪元 · 沉浸式解谜</div>
                <div class="panel-subtitle">科幻世界观 · NPC自由对话<br>六维思维深度评估</div>
                <div class="panel-features">
                    <div class="feature-item"><i class="fas fa-check"></i>沉浸式科幻世界探索</div>
                    <div class="feature-item"><i class="fas fa-check"></i>与NPC自由对话收集线索</div>
                    <div class="feature-item"><i class="fas fa-check"></i>AI六维思维深度评估</div>
                </div>
                <a class="enter-btn" href="starcore/index.html">
                    <i class="fas fa-rocket"></i> 进入星核纪元
                </a>
                <div class="time-badge"><i class="fas fa-clock"></i> 约15-30分钟</div>
            </div>
        </div>
    </div>

    <script>
        // Generate random stars for starcore panel
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (2 + Math.random() * 3) + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
